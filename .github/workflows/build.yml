name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ libssl-dev

      - name: Build
        run: make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fecraw-x86_64
          path: |
            fecraw
            build/libudp2raw_raw.so

  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$(pwd):/workspace" -w /workspace \
            ubuntu:24.04 bash -c '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y g++ libssl-dev make
              make
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fecraw-arm64
          path: |
            fecraw
            build/libudp2raw_raw.so

  release:
    needs: [build-x86_64, build-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Package
        run: |
          mkdir -p release
          for d in artifacts/fecraw-*; do
            arch=$(basename "$d" | sed 's/fecraw-//')
            mkdir -p "release/$arch"
            cp "$d/fecraw" "$d/libudp2raw_raw.so" "release/$arch/"
            tar -czf "release/fecraw-${arch}.tar.gz" -C "release/$arch" .
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          fail_on_unmatched_patterns: true
