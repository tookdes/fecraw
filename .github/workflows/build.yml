name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ libssl-dev

      - name: Build
        run: make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fecraw-${{ matrix.arch }}
          path: |
            fecraw
            build/libudp2raw_raw.so

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package
        run: |
          mkdir -p release
          for d in artifacts/fecraw-*; do
            arch=$(basename "$d" | sed 's/fecraw-//')
            cp "$d/fecraw" "$d/libudp2raw_raw.so" release/
            tar -czf "release/fecraw-${arch}.tar.gz" -C release fecraw libudp2raw_raw.so
            rm release/fecraw release/libudp2raw_raw.so
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          fail_on_unmatched_patterns: true
