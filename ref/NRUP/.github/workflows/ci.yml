name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -race -cover -timeout 60s ./...
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Cross compile
        run: |
          GOOS=linux GOARCH=amd64 go build ./...
          GOOS=linux GOARCH=arm64 go build ./...
          GOOS=linux GOARCH=mipsle go build ./...
          GOOS=darwin GOARCH=arm64 go build ./...
          GOOS=windows GOARCH=amd64 go build ./...

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Fuzz (30s each)
        run: |
          go test -fuzz=FuzzDecodeDataFrame -fuzztime=30s ./...
          go test -fuzz=FuzzFECCodec -fuzztime=30s ./...
          go test -fuzz=FuzzParseQUICInitial -fuzztime=30s ./...
